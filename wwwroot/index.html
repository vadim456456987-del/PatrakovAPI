<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .auth-section, .data-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .hidden {
            display: none;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

            button:hover {
                background-color: #0056b3;
            }

            button.delete-btn {
                background-color: #dc3545;
            }

                button.delete-btn:hover {
                    background-color: #c82333;
                }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .error {
            color: red;
            margin: 10px 0;
        }

        .success {
            color: green;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Management System</h1>

        <div id="message" class="error"></div>

        <div id="authSection" class="auth-section">
            <h2>Authentication</h2>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button onclick="register()">Register</button>
            <button onclick="login()">Login</button>
        </div>

        <div id="dataSection" class="data-section hidden">
            <h2>Customer Data <button onclick="logout()" style="float:right;">Logout</button></h2>

            <div>
                <h3>Add / Edit Customer</h3>
                <input type="hidden" id="customerId" />
                <input type="text" id="name" placeholder="Name" />
                <input type="email" id="customerEmail" placeholder="Email" />
                <input type="text" id="address" placeholder="Address" />  
                <button onclick="saveCustomer()">Save</button>
                <button onclick="clearForm()">Clear</button>
            </div>

            <h3>Customer List</h3>
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Address</th> 
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let token = localStorage.getItem('token');

        function showMessage(text, isError = true) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'error' : 'success';
            setTimeout(() => messageDiv.textContent = '', 5000);
        }

        function updateUIBasedOnAuth() {
            const authSection = document.getElementById('authSection');
            const dataSection = document.getElementById('dataSection');
            if (token) {
                authSection.classList.add('hidden');
                dataSection.classList.remove('hidden');
                loadCustomers();
            } else {
                authSection.classList.remove('hidden');
                dataSection.classList.add('hidden');
            }
        }

        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showMessage('Registration successful!', false);
                    updateUIBasedOnAuth();
                } else {
                    showMessage(data.message || 'Registration failed');
                }
            } catch (error) {
                showMessage('Error: ' + error.message);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showMessage('Login successful!', false);
                    updateUIBasedOnAuth();
                } else {
                    showMessage(data.message || 'Login failed');
                }
            } catch (error) {
                showMessage('Error: ' + error.message);
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            updateUIBasedOnAuth();
            clearForm();
        }

        async function loadCustomers() {
            try {
                const response = await fetch(`${API_BASE}/api/customer`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) {
                    logout();
                    showMessage('Session expired. Please login again.');
                    return;
                }
                const customers = await response.json();
                const tableBody = document.getElementById('customerTableBody');
                tableBody.innerHTML = '';
                customers.forEach(customer => {
                    const row = tableBody.insertRow();
                    row.insertCell(0).textContent = customer.id;
                    row.insertCell(1).textContent = customer.name;
                    row.insertCell(2).textContent = customer.email;
                    row.insertCell(3).textContent = customer.address;  

                    const actionsCell = row.insertCell(4);
                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.onclick = () => editCustomer(customer);
                    actionsCell.appendChild(editBtn);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.onclick = () => deleteCustomer(customer.id);
                    actionsCell.appendChild(deleteBtn);
                });
            } catch (error) {
                showMessage('Error loading customers: ' + error.message);
            }
        }

        async function saveCustomer() {
            const id = document.getElementById('customerId').value;
            const customer = {
                name: document.getElementById('name').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('address').value  
            };

            let url = `${API_BASE}/api/customer`;
            let method = 'POST';

            if (id) {
                url = `${API_BASE}/api/customer/${id}`;
                method = 'PUT';
                customer.id = parseInt(id);
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(customer)
                });

                if (response.ok) {
                    showMessage('Customer saved successfully!', false);
                    clearForm();
                    loadCustomers();
                } else {
                    const error = await response.json();
                    showMessage(error.title || 'Error saving customer');
                }
            } catch (error) {
                showMessage('Error: ' + error.message);
            }
        }

        function editCustomer(customer) {
            document.getElementById('customerId').value = customer.id;
            document.getElementById('name').value = customer.name;
            document.getElementById('customerEmail').value = customer.email;
            document.getElementById('address').value = customer.address;  
        }

        async function deleteCustomer(id) {
            if (!confirm('Are you sure you want to delete this customer?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/customer/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showMessage('Customer deleted!', false);
                    loadCustomers();
                } else {
                    const error = await response.json();
                    showMessage(error.title || 'Error deleting customer');
                }
            } catch (error) {
                showMessage('Error: ' + error.message);
            }
        }

        function clearForm() {
            document.getElementById('customerId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('customerEmail').value = '';
            document.getElementById('address').value = '';  
        }

        updateUIBasedOnAuth();
    </script>
</body>
</html>
